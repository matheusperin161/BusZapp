<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Gerenciar Frota – BuszApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" defer></script>
<link rel="shortcut icon" href="./img/icone.png" type="image/x-icon" />
  <link rel="stylesheet" href="./css/main.css"/>
  <style>
    .form-input{width:100%;padding:10px 14px;border-radius:10px;border:2px solid #e5e7eb;font-size:14px;outline:none;transition:border .2s;background:#fff}
    .form-input:focus{border-color:#f59e0b}
    .dark .form-input{background:#0f172a;border-color:#334155;color:#f1f5f9}
    .vehicle-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:8px;transition:box-shadow .2s}
    .vehicle-row:hover{box-shadow:0 4px 14px rgba(0,0,0,.12)}
    .dark .vehicle-row{background:#2d3748}
    .btn-icon{padding:7px;border-radius:8px;cursor:pointer;transition:background .15s;border:none;background:transparent}
    .btn-icon:hover{background:#f3f4f6}.dark .btn-icon:hover{background:#4a5568}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
    .modal-box{background:#fff;border-radius:20px;padding:28px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 60px rgba(0,0,0,.3);animation:slideUp .3s ease}
    .dark .modal-box{background:#1e293b;color:#f1f5f9}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
    .badge-green{background:#dcfce7;color:#166534}.badge-red{background:#fee2e2;color:#991b1b}.badge-yellow{background:#fef3c7;color:#92400e}.badge-gray{background:#f3f4f6;color:#374151}
    .dark .badge-green{background:#14532d;color:#86efac}.dark .badge-red{background:#7f1d1d;color:#fca5a5}.dark .badge-yellow{background:#78350f;color:#fde68a}.dark .badge-gray{background:#374151;color:#d1d5db}
  </style>
</head>
<body class="bg-yellow-50 dark:bg-gray-900 min-h-screen flex flex-col">

<header class="bg-gradient-to-r from-yellow-400 to-amber-500 text-white shadow-lg sticky top-0 z-40">
  <div class="container mx-auto px-4 py-3 flex items-center gap-3">
    <button onclick="window.location.href='dashboard.html'" class="p-2 rounded-full hover:bg-white/20 transition">
      <i data-feather="arrow-left" class="w-5 h-5"></i>
    </button>
    <div class="flex items-center gap-3">
      <div class="bg-white/20 p-2 rounded-xl"><i data-feather="truck" class="w-5 h-5"></i></div>
      <div>
        <h1 class="text-lg font-bold">Gerenciar Frota</h1>
        <p class="text-xs opacity-80">Administre os veículos da frota</p>
      </div>
    </div>
  </div>
</header>

<main class="container mx-auto px-4 py-6 flex-grow">
  <!-- Top bar -->
  <div class="flex items-center justify-between mb-5">
    <div>
      <h2 class="text-xl font-bold text-gray-900 dark:text-white">Veículos Cadastrados</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5" id="vehicleCount">Carregando…</p>
    </div>
    <button onclick="openModal()"
            class="flex items-center gap-2 bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-4 py-2.5 rounded-xl transition text-sm">
      <i data-feather="plus" class="w-4 h-4"></i> Novo Veículo
    </button>
  </div>

  <!-- Filters -->
  <div class="flex gap-3 mb-5 flex-wrap">
    <div class="relative flex-1 min-w-48">
      <i data-feather="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-yellow-500 pointer-events-none"></i>
      <input id="searchInput" type="text" placeholder="Buscar por placa ou modelo…"
             oninput="filterVehicles()"
             class="form-input pl-10"/>
    </div>
    <select id="statusFilter" onchange="filterVehicles()" class="form-input" style="width:auto;min-width:140px">
      <option value="">Todos os status</option>
      <option value="ativo">Ativo</option>
      <option value="inativo">Inativo</option>
      <option value="manutencao">Manutenção</option>
    </select>
  </div>

  <!-- Vehicle list -->
  <div id="vehicleList">
    <p class="text-gray-400 text-center py-10">Carregando veículos…</p>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div id="vehicleModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="flex justify-between items-center mb-5">
      <h3 id="modalTitle" class="text-lg font-bold text-gray-900 dark:text-white">Novo Veículo</h3>
      <button onclick="closeModal()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
        <i data-feather="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1 block">PLACA *</label>
          <input id="vPlate" type="text" placeholder="ABC-1234" class="form-input"/>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1 block">ANO *</label>
          <input id="vYear" type="number" placeholder="2022" class="form-input"/>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1 block">MARCA *</label>
          <input id="vBrand" type="text" placeholder="Mercedes" class="form-input"/>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1 block">MODELO *</label>
          <input id="vModel" type="text" placeholder="OF-1721" class="form-input"/>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1 block">CAPACIDADE *</label>
          <input id="vCapacity" type="number" placeholder="40" class="form-input"/>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1 block">STATUS *</label>
          <select id="vStatus" class="form-input">
            <option value="">Selecione…</option>
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
            <option value="manutencao">Manutenção</option>
          </select>
        </div>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 mb-1 block">LINHA DO ÔNIBUS</label>
        <select id="vBusLine" class="form-input">
          <option value="">Sem linha atribuída</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 mb-1 block">MOTORISTA RESPONSÁVEL</label>
        <select id="vDriver" class="form-input">
          <option value="">Sem motorista atribuído</option>
        </select>
      </div>
    </div>
    <div id="modalError" class="hidden mt-3 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm rounded-xl"></div>
    <div class="flex gap-3 mt-5">
      <button onclick="closeModal()" class="flex-1 py-2.5 rounded-xl border-2 border-gray-200 dark:border-gray-600 font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition">Cancelar</button>
      <button onclick="saveVehicle()" class="flex-1 py-2.5 rounded-xl bg-yellow-500 hover:bg-yellow-600 text-white font-bold transition">Salvar</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-overlay hidden">
  <div class="modal-box max-w-sm">
    <div class="text-center mb-4">
      <div class="w-14 h-14 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-3">
        <i data-feather="trash-2" class="w-7 h-7 text-red-500"></i>
      </div>
      <h3 class="text-lg font-bold text-gray-900 dark:text-white">Remover Veículo?</h3>
      <p id="deleteVehicleName" class="text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
    </div>
    <div class="flex gap-3">
      <button onclick="closeDeleteModal()" class="flex-1 py-2.5 rounded-xl border-2 border-gray-200 dark:border-gray-600 font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 transition">Cancelar</button>
      <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-bold transition">Remover</button>
    </div>
  </div>
</div>

<script src="./js/app.js"></script>
<script>
  let allVehicles=[], editingId=null, deletingId=null;
  function esc(s=''){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  const STATUS_BADGE={
    ativo:'badge-green',inativo:'badge-red',manutencao:'badge-yellow'
  };
  const STATUS_LABEL={ativo:'Ativo',inativo:'Inativo',manutencao:'Manutenção'};

  async function loadVehicles(){
    try{
      allVehicles=await API.get('/api/admin/vehicles');
      renderVehicles(allVehicles);
    }catch(e){
      document.getElementById('vehicleList').innerHTML='<p class="text-red-400 text-center py-8">Erro ao carregar veículos.</p>';
    }
  }

  function renderVehicles(list){
    const el=document.getElementById('vehicleList');
    document.getElementById('vehicleCount').textContent=`${list.length} veículo(s) cadastrado(s)`;
    if(!list.length){
      el.innerHTML=`<div class="text-center py-12 text-gray-400 dark:text-gray-500">
        <i data-feather="truck" class="w-12 h-12 mx-auto mb-3 opacity-30"></i>
        <p class="font-semibold">Nenhum veículo cadastrado</p>
        <p class="text-sm mt-1">Clique em "Novo Veículo" para começar</p>
      </div>`;
      if(typeof feather!=='undefined')feather.replace();return;
    }
    el.innerHTML=list.map(v=>{
      const badge=STATUS_BADGE[v.status]||'badge-gray';
      const label=STATUS_LABEL[v.status]||v.status;
      return `<div class="vehicle-row">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-yellow-400 to-amber-500 flex items-center justify-center flex-shrink-0">
          <i data-feather="truck" class="w-5 h-5 text-white"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-bold text-gray-900 dark:text-white text-sm">${esc(v.brand)} ${esc(v.model)} <span class="text-gray-400 font-mono text-xs">${esc(v.plate)}</span></p>
          <p class="text-xs text-gray-400">Ano: ${v.year} · Capacidade: ${v.capacity} passageiros</p>
          ${v.bus_line?`<p class="text-xs text-gray-400">Linha: ${esc(v.bus_line)}</p>`:''}
        </div>
        <div class="flex-shrink-0 hidden sm:block">
          <span class="badge ${badge}">${label}</span>
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button class="btn-icon text-blue-500" onclick="openEditModal(${v.id})" title="Editar">
            <i data-feather="edit-2" class="w-4 h-4"></i>
          </button>
          <button class="btn-icon text-red-500" onclick="openDeleteModal(${v.id},'${esc(v.plate)}')" title="Remover">
            <i data-feather="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
      </div>`;
    }).join('');
    if(typeof feather!=='undefined')feather.replace();
  }

  function filterVehicles(){
    const q=document.getElementById('searchInput').value.toLowerCase().trim();
    const s=document.getElementById('statusFilter').value;
    renderVehicles(allVehicles.filter(v=>{
      const matchQ=!q||v.plate.toLowerCase().includes(q)||v.model.toLowerCase().includes(q)||v.brand.toLowerCase().includes(q);
      const matchS=!s||v.status===s;
      return matchQ&&matchS;
    }));
  }

  async function loadSelects(){
    try{
      const [routes,drivers]=await Promise.all([API.get('/api/routes'),API.get('/api/admin/drivers')]);
      const linesSel=document.getElementById('vBusLine');
      linesSel.innerHTML='<option value="">Sem linha atribuída</option>';
      routes.forEach(r=>{const o=document.createElement('option');o.value=`${r.route_number} - ${r.route_name}`;o.textContent=`${r.route_number} - ${r.route_name}`;linesSel.appendChild(o);});
      const driversSel=document.getElementById('vDriver');
      driversSel.innerHTML='<option value="">Sem motorista atribuído</option>';
      drivers.forEach(d=>{const o=document.createElement('option');o.value=d.id;o.textContent=`${d.name} (${d.code})`;driversSel.appendChild(o);});
    }catch(e){}
  }

  function openModal(){
    editingId=null;
    document.getElementById('modalTitle').textContent='Novo Veículo';
    ['vPlate','vYear','vBrand','vModel','vCapacity'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('vStatus').value='';
    document.getElementById('vBusLine').value='';
    document.getElementById('vDriver').value='';
    document.getElementById('modalError').classList.add('hidden');
    document.getElementById('vehicleModal').classList.remove('hidden');
    if(typeof feather!=='undefined')feather.replace();
  }

  async function openEditModal(id){
    try{
      const v=await API.get(`/api/admin/vehicles/${id}`);
      editingId=id;
      document.getElementById('modalTitle').textContent='Editar Veículo';
      document.getElementById('vPlate').value=v.plate;
      document.getElementById('vYear').value=v.year;
      document.getElementById('vBrand').value=v.brand;
      document.getElementById('vModel').value=v.model;
      document.getElementById('vCapacity').value=v.capacity;
      document.getElementById('vStatus').value=v.status;
      document.getElementById('vBusLine').value=v.bus_line||'';
      document.getElementById('vDriver').value=v.driver_id||'';
      document.getElementById('modalError').classList.add('hidden');
      document.getElementById('vehicleModal').classList.remove('hidden');
      if(typeof feather!=='undefined')feather.replace();
    }catch(e){Toast.error('Erro ao carregar veículo.');}
  }

  function closeModal(){document.getElementById('vehicleModal').classList.add('hidden');}

  async function saveVehicle(){
    const errEl=document.getElementById('modalError');
    const body={
      plate:document.getElementById('vPlate').value.trim(),
      year:document.getElementById('vYear').value,
      brand:document.getElementById('vBrand').value.trim(),
      model:document.getElementById('vModel').value.trim(),
      capacity:document.getElementById('vCapacity').value,
      status:document.getElementById('vStatus').value,
      bus_line:document.getElementById('vBusLine').value||null,
      driver_id:document.getElementById('vDriver').value||null,
    };
    if(!body.plate||!body.year||!body.brand||!body.model||!body.capacity||!body.status){
      errEl.textContent='Preencha todos os campos obrigatórios.';errEl.classList.remove('hidden');return;
    }
    try{
      if(editingId){await API.put(`/api/admin/vehicles/${editingId}`,body);Toast.success('Veículo atualizado!');}
      else{await API.post('/api/admin/vehicles',body);Toast.success('Veículo cadastrado!');}
      closeModal();loadVehicles();
    }catch(e){errEl.textContent=e.message||'Erro ao salvar.';errEl.classList.remove('hidden');}
  }

  function openDeleteModal(id,plate){
    deletingId=id;
    document.getElementById('deleteVehicleName').textContent=`Placa: ${plate}`;
    document.getElementById('deleteModal').classList.remove('hidden');
  }
  function closeDeleteModal(){document.getElementById('deleteModal').classList.add('hidden');deletingId=null;}
  async function confirmDelete(){
    try{await API.delete(`/api/admin/vehicles/${deletingId}`);Toast.success('Veículo removido!');closeDeleteModal();loadVehicles();}
    catch(e){Toast.error('Erro ao remover.');}
  }

  // Dark mode
  const saved=localStorage.getItem('theme'),prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  if(saved==='dark'||(saved===null&&prefersDark))document.documentElement.classList.add('dark');

  document.addEventListener('DOMContentLoaded',()=>{
    loadSelects();loadVehicles();
    if(typeof feather!=='undefined')feather.replace();
  });
</script>
</body>
</html>
